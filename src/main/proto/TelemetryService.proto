syntax = "proto3";

option java_multiple_files = true;
option java_package = "generated.telemetry";
option java_outer_classname = "TelemetryServiceImpl";

package telemetry;

// The telemetry service definition.
service TelemetryService {

    // Unary: one request -> one response
    rpc GetSnapshot (GetSnapshotRequest) returns (LoadSnapshot) {}

    // Server streaming: one request -> stream of responses
    rpc StreamLoad (StreamLoadRequest) returns (stream LoadSample) {}
}

// Unary request
message GetSnapshotRequest {
    string meterId = 1;
}

// Unary response
message LoadSnapshot {
    string meterId = 1;
    string buildingId = 2;
    double kwLoad = 3;
    int64 timestamp = 4;
    string status = 5;
}

// Server streaming request
message StreamLoadRequest {
    string meterId = 1;
    int32 numberOfSamples = 2;
}

// Server streaming response
message LoadSample {
    string meterId = 1;
    double kwLoad = 2;
    int64 timestamp = 3;
}